defaults:
  - env/libero_10@env.train
  - env/libero_10@env.eval
  - model/deepthinkvla@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/bucket_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-7

runner:
  task_type: embodied
  logger:
    log_path: "../results/libero_10_grpo_deepthinkvla"
    project_name: rlinf
    experiment_name: "test_deepthinkvla"
    logger_backends: ["wandb", "tensorboard"] # wandb, swanlab

  max_epochs: 100
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 10

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 8
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 2
  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean" 
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2 
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  # --- CoT Causal Rewards ---
  # Masked-CoT: rewards the model when CoT reasoning actually helps action prediction
  # (compares normal action logprobs vs. logprobs with CoT attention zeroed out)
  use_cot_causal_reward: False
  cot_causal_reward_coef: 0.0  # set > 0 to enable, e.g. 0.01

  # Wrong-CoT: rewards the model when actions are more likely under correct CoT
  # than under another sample's CoT (circular shift across batch)
  use_wrong_cot_causal_reward: False
  wrong_cot_causal_reward_coef: 0.0  # set > 0 to enable, e.g. 0.01
  # params for generation
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: 300
    max_length: 1042
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    reward_coef: ${algorithm.reward_coef}
    group_size: ${algorithm.group_size}
    max_episode_steps: 480 # max episode steps for truncation
    max_steps_per_rollout_epoch: 480
  eval:
    total_num_envs: 500
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: True  # required: autoregressive CoT generation needs full model on GPU during rollout
  pipeline_stage_num: 1

  model:
    model_path: "/workspace/DeepThinkVLA/yinchenghust/deepthinkvla_libero_cot_sft"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4  # small due to long seq len (~600 tokens with CoT); OpenPI uses 128 but has fixed-size flow matching
  global_batch_size: 2048  # matches OpenPI; effective via 64 grad accum steps per rank
  seed: 42
  enable_offload: True  # required: frees GPU memory between training and rollout phases

  # Override the default values in model/pi0
  model:
    model_path: "/workspace/DeepThinkVLA/yinchenghust/deepthinkvla_libero_cot_sft"

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 2.0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"  # required: full FSDP sharding to fit autoregressive model in memory
    use_orig_params: True
    gradient_checkpointing: True  # required: saves activation memory for long CoT+action sequences
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
